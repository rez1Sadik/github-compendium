site_name: GitHub Compendium
site_description: Technical documentation and research notes.

theme:
  name: material
  font:
    text: Roboto
    code: Fira Code
  features:
    - navigation.tabs
    - header.autohide 
  palette:
    # Light Mode: Clean white and grey
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: slate
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark Mode: Soft slate
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: slate
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Version Control:
    - Git Reset Guide: git-reset.md